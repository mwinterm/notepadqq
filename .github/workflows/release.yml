name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (for manual runs; release jobs use the release tag automatically)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Linux build: produces an AppImage (Qt 6)
  # ---------------------------------------------------------------------------
  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies (Qt 6)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            qt6-base-dev \
            qt6-base-dev-tools \
            qt6-tools-dev \
            qt6-tools-dev-tools \
            qt6-l10n-tools \
            qt6-webengine-dev \
            qt6-webengine-dev-tools \
            libqt6webenginecore6-bin \
            qt6-websockets-dev \
            libqt6svg6-dev \
            libqt6core5compat6-dev \
            libgl1-mesa-dev \
            libuchardet-dev \
            libfuse2t64 \
            wget \
            file \
            desktop-file-utils

      - name: Configure
        run: |
          QMAKE=$(command -v qmake6)
          LRELEASE=$(command -v lrelease6 || command -v /usr/lib/qt6/libexec/lrelease || command -v lrelease)
          echo "Using QMAKE=$QMAKE"
          echo "Using LRELEASE=$LRELEASE"
          ./configure --prefix=/usr --qmake="$QMAKE" --lrelease="$LRELEASE"

      - name: Build
        run: make -j$(nproc)

      - name: Stage install into AppDir
        run: |
          make install INSTALL_ROOT="${GITHUB_WORKSPACE}/AppDir"
          find AppDir -maxdepth 5 -type f -name 'notepadqq*' -print

      - name: Download linuxdeploy tools
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="$(git describe --tags --always)"
          fi
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build AppImage
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Point linuxdeploy-plugin-qt at Qt 6 explicitly.
          export QMAKE="$(command -v qmake6)"
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin qt \
            --desktop-file AppDir/usr/share/applications/notepadqq.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/256x256/apps/notepadqq.png \
            --executable AppDir/usr/lib/notepadqq/notepadqq-bin \
            --output appimage
          mv Notepadqq-*.AppImage "Notepadqq-${VERSION}-x86_64.AppImage" 2>/dev/null \
            || mv Notepadqq*x86_64.AppImage "Notepadqq-${VERSION}-x86_64.AppImage"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: notepadqq-linux-appimage
          path: Notepadqq-*.AppImage
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: Notepadqq-*.AppImage

  # ---------------------------------------------------------------------------
  # macOS build: produces a DMG (Qt 6)
  # ---------------------------------------------------------------------------
  build-macos:
    name: Build macOS DMG
    runs-on: macos-13
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies (Qt 6)
        run: |
          brew update
          brew install qt uchardet pkg-config
          QT_PREFIX="$(brew --prefix qt)"
          echo "${QT_PREFIX}/bin" >> "$GITHUB_PATH"
          echo "QT_PREFIX=${QT_PREFIX}" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=${QT_PREFIX}/lib/pkgconfig:$(brew --prefix uchardet)/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Configure
        run: |
          ./configure \
            --qmake="${QT_PREFIX}/bin/qmake" \
            --lrelease="${QT_PREFIX}/bin/lrelease"

      - name: Build
        run: make -j$(sysctl -n hw.ncpu)

      - name: Bundle with macdeployqt
        run: |
          cd out/release
          # In Qt 6 the WebEngine helper lives under
          # QtWebEngineCore.framework/Helpers (no Versions/5 segment).
          HELPER_PATH="$(find notepadqq.app/Contents/Frameworks/QtWebEngineCore.framework \
                          -path '*Helpers/QtWebEngineProcess.app/Contents/MacOS/QtWebEngineProcess' \
                          -print -quit)"
          echo "WebEngine helper: $HELPER_PATH"
          macdeployqt notepadqq.app \
            -executable=notepadqq.app/Contents/MacOS/notepadqq
          if [ -n "$HELPER_PATH" ]; then
            macdeployqt notepadqq.app -executable="$HELPER_PATH"
          fi

      - name: Fix bundle paths
        run: |
          cd out/release
          HELPER_PATH="$(find notepadqq.app/Contents/Frameworks/QtWebEngineCore.framework \
                          -path '*Helpers/QtWebEngineProcess.app/Contents/MacOS/QtWebEngineProcess' \
                          -print -quit)"
          QT_CELLAR_GLOB="$(brew --cellar qt)/*"
          python3 ../../.travis/tools/macdeployqtfix/macdeployqtfix.py \
            notepadqq.app/Contents/MacOS/notepadqq \
            ${QT_CELLAR_GLOB}
          if [ -n "$HELPER_PATH" ]; then
            python3 ../../.travis/tools/macdeployqtfix/macdeployqtfix.py \
              "$HELPER_PATH" \
              ${QT_CELLAR_GLOB}
          fi

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="$(git describe --tags --always)"
          fi
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create DMG
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cd out/release
          mkdir dmgfolder
          mv notepadqq.app dmgfolder/
          ln -s /Applications ./dmgfolder/Applications
          hdiutil create -fs HFS+ -format UDBZ \
            -srcfolder ./dmgfolder \
            -volname "Notepadqq ${VERSION}" \
            "Notepadqq-${VERSION}-macos.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: notepadqq-macos-dmg
          path: out/release/Notepadqq-*.dmg
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: out/release/Notepadqq-*.dmg
