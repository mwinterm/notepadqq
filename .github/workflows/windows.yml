name: Windows Build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.0.0)'
        required: false
      create_release:
        description: 'Create a GitHub release'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          arch: win64_msvc2019_64
          modules: qtwebengine qtwebchannel qtwebsockets qtpositioning qt5compat

      - name: Install uchardet (vcpkg)
        run: vcpkg install uchardet:x64-windows

      - name: Configure
        shell: cmd
        run: |
          cmake -S . -B build ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_PREFIX_PATH="%Qt6_DIR%" ^
            -DCMAKE_TOOLCHAIN_FILE="%VCPKG_INSTALLATION_ROOT%\scripts\buildsystems\vcpkg.cmake"

      - name: Build
        run: cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS

      - name: Bundle with windeployqt
        shell: cmd
        run: |
          cd out\release
          windeployqt notepadqq.exe --release --no-translations --no-compiler-runtime

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="$(git describe --tags --always)"
          fi
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create ZIP
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          Compress-Archive -Path out\release\* -DestinationPath "Notepadqq-${env:VERSION}-windows-x64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: notepadqq-windows-x64-zip
          path: Notepadqq-*.zip
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: Notepadqq-*.zip

  release:
    name: Create Draft Release
    if: github.event_name == 'workflow_dispatch' && inputs.create_release
    needs: [build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts
          merge-multiple: true

      - name: Resolve version
        id: version
        run: |
          VERSION="$(ls artifacts/Notepadqq-*-windows-x64.zip 2>/dev/null | head -1 | sed 's/.*Notepadqq-\(.*\)-windows-x64.zip/\1/')"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Notepadqq ${{ steps.version.outputs.version }}
          draft: true
          generate_release_notes: true
          files: |
            artifacts/Notepadqq-*.zip
