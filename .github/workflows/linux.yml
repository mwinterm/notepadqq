name: Linux Build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.0.0)'
        required: false
      create_release:
        description: 'Create a GitHub release'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux AppImage (x86_64)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies (Qt 6)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config cmake \
            qt6-base-dev qt6-base-dev-tools qt6-tools-dev qt6-tools-dev-tools \
            qt6-webengine-dev qt6-webengine-dev-tools \
            qt6-l10n-tools \
            libqt6websockets6-dev libqt6svg6-dev libqt6core5compat6-dev \
            libqt6webchannel6-dev libqt6opengl6-dev \
            libuchardet-dev \
            libgl1-mesa-dev \
            libfuse2
          # Locate qmake6 for linuxdeploy Qt plugin
          QMAKE="$(command -v qmake6 2>/dev/null || command -v qmake 2>/dev/null)"
          echo "QMAKE=${QMAKE}" >> "$GITHUB_ENV"

      - name: Configure
        run: ./configure --prefix=/usr

      - name: Build
        run: make

      - name: Install to AppDir
        run: DESTDIR="$PWD/AppDir" cmake --install build

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="$(git describe --tags --always)"
          fi
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create AppImage
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Download linuxdeploy and its Qt plugin (supports Qt6)
          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage" -O linuxdeploy
          wget -q "https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage" -O linuxdeploy-plugin-qt
          chmod +x linuxdeploy linuxdeploy-plugin-qt

          # Ensure desktop entry and icon are in AppDir
          mkdir -p AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/scalable/apps
          cp support_files/shortcuts/notepadqq.desktop AppDir/usr/share/applications/
          cp support_files/icons/hicolor/scalable/apps/notepadqq.svg AppDir/usr/share/icons/hicolor/scalable/apps/ 2>/dev/null || true

          # The installed launcher at usr/bin/notepadqq is a shell script;
          # replace it with a symlink to the real binary so linuxdeploy can
          # trace ELF dependencies.
          rm -f AppDir/usr/bin/notepadqq
          ln -s ../lib/notepadqq/notepadqq-bin AppDir/usr/bin/notepadqq

          # Tell the Qt plugin where to find qmake
          export QMAKE="${QMAKE}"

          # Build the AppImage
          ./linuxdeploy \
            --appdir AppDir \
            --desktop-file AppDir/usr/share/applications/notepadqq.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/scalable/apps/notepadqq.svg \
            --plugin qt \
            --output appimage

      - name: Rename AppImage
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mv Notepadqq-*.AppImage "Notepadqq-${VERSION}-linux-x86_64.AppImage" 2>/dev/null || \
          mv notepadqq-*.AppImage "Notepadqq-${VERSION}-linux-x86_64.AppImage" 2>/dev/null || \
          mv *.AppImage "Notepadqq-${VERSION}-linux-x86_64.AppImage"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: notepadqq-linux-x86_64-appimage
          path: Notepadqq-*.AppImage
          if-no-files-found: error

  release:
    name: Create Draft Release
    if: github.event_name == 'workflow_dispatch' && inputs.create_release
    needs: [build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts
          merge-multiple: true

      - name: Resolve version
        id: version
        run: |
          VERSION="$(ls artifacts/Notepadqq-*-linux-x86_64.AppImage 2>/dev/null | head -1 | sed 's/.*Notepadqq-\(.*\)-linux-x86_64.AppImage/\1/')"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Notepadqq ${{ steps.version.outputs.version }}
          draft: true
          generate_release_notes: true
          files: |
            artifacts/Notepadqq-*.AppImage
