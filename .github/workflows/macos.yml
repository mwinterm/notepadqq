name: macOS Build

on:
  push:
    branches: [ master, macos-port ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install qt@5 uchardet pkg-config
          echo "/usr/local/opt/qt@5/bin" >> $GITHUB_PATH

      - name: Configure
        run: |
          export PKG_CONFIG_PATH="/usr/local/opt/qt@5/lib/pkgconfig:$PKG_CONFIG_PATH"
          ./configure
        env:
          PKG_CONFIG_PATH: /usr/local/opt/qt@5/lib/pkgconfig

      - name: Build
        run: make

      - name: Bundle with macdeployqt
        run: |
          cd out/release
          macdeployqt notepadqq.app -executable=notepadqq.app/Contents/MacOS/notepadqq
          macdeployqt notepadqq.app -executable=notepadqq.app/Contents/Frameworks/QtWebEngineCore.framework/Versions/5/Helpers/QtWebEngineProcess.app/Contents/MacOS/QtWebEngineProcess

      - name: Fix bundle paths
        run: |
          cd out/release
          python3 ../../.travis/tools/macdeployqtfix/macdeployqtfix.py \
            notepadqq.app/Contents/MacOS/notepadqq \
            /usr/local/Cellar/qt@5/5.*
          python3 ../../.travis/tools/macdeployqtfix/macdeployqtfix.py \
            notepadqq.app/Contents/Frameworks/QtWebEngineCore.framework/Versions/5/Helpers/QtWebEngineProcess.app/Contents/MacOS/QtWebEngineProcess \
            /usr/local/Cellar/qt@5/5.*

      - name: Create DMG
        run: |
          cd out/release
          mkdir dmgfolder
          mv notepadqq.app dmgfolder
          ln -s /Applications ./dmgfolder/Applications
          hdiutil create -fs HFS+ -format UDBZ \
            -srcfolder ./dmgfolder \
            -volname Notepadqq \
            notepadqq.dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: notepadqq-macos
          path: out/release/notepadqq.dmg
