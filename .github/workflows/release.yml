name: Build & Release

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.0.0)'
        required: false
      create_release:
        description: 'Create a GitHub release'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux AppImage (x86_64)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies (Qt 6)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            qt6-base-dev qt6-base-dev-tools qt6-tools-dev qt6-tools-dev-tools \
            qt6-webengine-dev qt6-webengine-dev-tools \
            qt6-l10n-tools \
            libqt6websockets6-dev libqt6svg6-dev libqt6core5compat6-dev \
            libqt6webchannel6-dev libqt6opengl6-dev \
            libuchardet-dev \
            libgl1-mesa-dev \
            libfuse2
          # Locate qmake6 for linuxdeploy Qt plugin
          QMAKE="$(command -v qmake6 2>/dev/null || command -v qmake 2>/dev/null)"
          echo "QMAKE=${QMAKE}" >> "$GITHUB_ENV"

      - name: Configure
        run: |
          ./configure --prefix=/usr

      - name: Build
        run: make -j$(nproc)

      - name: Install to AppDir
        run: DESTDIR="$PWD/AppDir" cmake --install build

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="$(git describe --tags --always)"
          fi
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create AppImage
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Download linuxdeploy and its Qt plugin (supports Qt6)
          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage" -O linuxdeploy
          wget -q "https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage" -O linuxdeploy-plugin-qt
          chmod +x linuxdeploy linuxdeploy-plugin-qt

          # Create desktop entry and icon in AppDir if not already installed
          mkdir -p AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/scalable/apps
          cp support_files/shortcuts/notepadqq.desktop AppDir/usr/share/applications/
          cp support_files/icons/hicolor/scalable/apps/notepadqq.svg AppDir/usr/share/icons/hicolor/scalable/apps/ 2>/dev/null || true

          # Create translations dir so linuxdeploy-plugin-qt can place symlinks
          mkdir -p AppDir/usr/translations

          # Remove AppStream metadata to avoid strict appstreamcli validation
          rm -f AppDir/usr/share/metainfo/*.xml

          # The installed launcher at usr/bin/notepadqq is a shell script;
          # replace it with a symlink to the real binary so linuxdeploy can
          # trace ELF dependencies.
          rm -f AppDir/usr/bin/notepadqq
          ln -s ../lib/notepadqq/notepadqq-bin AppDir/usr/bin/notepadqq

          # Tell the Qt plugin where to find qmake
          export QMAKE="${QMAKE}"

          # Build the AppImage
          ./linuxdeploy \
            --appdir AppDir \
            --desktop-file AppDir/usr/share/applications/notepadqq.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/scalable/apps/notepadqq.svg \
            --plugin qt \
            --output appimage

      - name: Rename AppImage
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mv Notepadqq-*.AppImage "Notepadqq-${VERSION}-linux-x86_64.AppImage" 2>/dev/null || \
          mv notepadqq-*.AppImage "Notepadqq-${VERSION}-linux-x86_64.AppImage" 2>/dev/null || \
          mv *.AppImage "Notepadqq-${VERSION}-linux-x86_64.AppImage"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: notepadqq-linux-x86_64-appimage
          path: Notepadqq-*.AppImage
          if-no-files-found: error

  build-macos:
    name: Build macOS DMG (arm64)
    runs-on: macos-14          # Apple Silicon (M1) runner
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies (Qt 6)
        run: |
          brew install qt uchardet pkg-config 2>/dev/null || true
          QT_PREFIX="$(brew --prefix qt)"
          echo "${QT_PREFIX}/bin" >> "$GITHUB_PATH"
          echo "QT_PREFIX=${QT_PREFIX}" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=${QT_PREFIX}/lib/pkgconfig:$(brew --prefix uchardet)/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Configure
        run: |
          ./configure

      - name: Build
        run: make -j$(sysctl -n hw.ncpu)

      - name: Bundle with macdeployqt
        run: |
          cd out/release
          macdeployqt notepadqq.app \
            -executable=notepadqq.app/Contents/MacOS/notepadqq
          # Qt 6 WebEngine helper (path differs from Qt 5)
          HELPER_PATH="$(find notepadqq.app -name QtWebEngineProcess -type f 2>/dev/null | head -1)"
          if [ -n "$HELPER_PATH" ]; then
            echo "Bundling WebEngine helper: $HELPER_PATH"
            macdeployqt notepadqq.app -executable="$HELPER_PATH"
          fi

      - name: Fix bundle paths
        continue-on-error: true
        run: |
          cd out/release
          QT_CELLAR="$(brew --cellar qt)/"*
          python3 ../../build-tools/macdeployqtfix/macdeployqtfix.py \
            notepadqq.app/Contents/MacOS/notepadqq \
            ${QT_CELLAR}
          HELPER_PATH="$(find notepadqq.app -name QtWebEngineProcess -type f 2>/dev/null | head -1)"
          if [ -n "$HELPER_PATH" ]; then
            python3 ../../build-tools/macdeployqtfix/macdeployqtfix.py \
              "$HELPER_PATH" \
              ${QT_CELLAR}
          fi

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="$(git describe --tags --always)"
          fi
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create DMG
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cd out/release
          mkdir dmgfolder
          mv notepadqq.app dmgfolder/
          ln -s /Applications ./dmgfolder/Applications
          hdiutil create -fs HFS+ -format UDBZ \
            -srcfolder ./dmgfolder \
            -volname "Notepadqq ${VERSION}" \
            "Notepadqq-${VERSION}-macos-arm64.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: notepadqq-macos-arm64-dmg
          path: out/release/Notepadqq-*.dmg
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: out/release/Notepadqq-*.dmg

  build-windows:
    name: Build Windows ZIP (x64)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          arch: win64_msvc2019_64
          modules: qtwebengine qtwebchannel qtwebsockets qtpositioning qt5compat

      - name: Install uchardet (vcpkg)
        run: vcpkg install uchardet:x64-windows

      - name: Configure
        shell: cmd
        run: |
          cmake -S . -B build ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_PREFIX_PATH="%Qt6_DIR%" ^
            -DCMAKE_TOOLCHAIN_FILE="%VCPKG_INSTALLATION_ROOT%\scripts\buildsystems\vcpkg.cmake"

      - name: Build
        run: cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS

      - name: Bundle with windeployqt
        shell: cmd
        run: |
          cd out\release
          windeployqt notepadqq.exe --release --no-translations --no-compiler-runtime

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="$(git describe --tags --always)"
          fi
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create ZIP
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          Compress-Archive -Path out\release\* -DestinationPath "Notepadqq-${env:VERSION}-windows-x64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: notepadqq-windows-x64-zip
          path: Notepadqq-*.zip
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: Notepadqq-*.zip

  release:
    name: Publish Release
    if: github.event_name == 'workflow_dispatch' && inputs.create_release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts
          merge-multiple: true

      - name: Resolve version
        id: version
        run: |
          # Extract version from artifact filename
          VERSION="$(ls artifacts/Notepadqq-*-macos-arm64.dmg 2>/dev/null | head -1 | sed 's/.*Notepadqq-\(.*\)-macos-arm64.dmg/\1/')"
          if [ -z "$VERSION" ]; then
            VERSION="$(ls artifacts/Notepadqq-*-linux-x86_64.AppImage 2>/dev/null | head -1 | sed 's/.*Notepadqq-\(.*\)-linux-x86_64.AppImage/\1/')"
          fi
          if [ -z "$VERSION" ]; then
            VERSION="$(ls artifacts/Notepadqq-*-windows-x64.zip 2>/dev/null | head -1 | sed 's/.*Notepadqq-\(.*\)-windows-x64.zip/\1/')"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Notepadqq ${{ steps.version.outputs.version }}
          draft: true
          generate_release_notes: true
          files: |
            artifacts/Notepadqq-*.dmg
            artifacts/Notepadqq-*.AppImage
            artifacts/Notepadqq-*.zip
